# Documentation on how to configure the bundle can be found at: https://symfony.com/doc/current/bundles/LiipImagineBundle/basic-usage.html
liip_imagine:
    twig:
        mode: lazy
    driver: "gd"
    default_filter_set_settings:
        format: webp
        quality: 90
    resolvers:
        default:
            web_path:
                web_root: '%kernel.project_dir%/public'
                cache_prefix: 'media/cache'
    loaders:
        default:
            filesystem:
                data_root: '%kernel.project_dir%/public'
    filter_sets:
        media_vignette:
            filters:
                thumbnail: { size: [420, 540], mode: outbound }
        media_home:
            filters:
                thumbnail: { size: [640, 811], mode: outbound }
        media_ina:
            filters:
                thumbnail: { size: [444, 666], mode: outbound }
